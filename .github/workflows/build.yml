name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PRIVATE_DEPS_BACKENDS: github,drive
      PRIVATE_DEPS_REPO: DemonBigj781/custom-workers-private-deps
      PRIVATE_DEPS_TAG: game-install-deps
      GOOGLE_DRIVE_FILE_ID: ${{ secrets.GOOGLE_DRIVE_FILE_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependency fetch helpers
        run: python3 -m pip install --disable-pip-version-check google-api-python-client google-auth google-auth-httplib2

      - name: Restore private install-derived dependencies
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_DEPS_TOKEN }}
        run: |
          set -eu
          chmod +x tools/deps/*.sh
          tools/deps/fetch-for-ci.sh "$GITHUB_WORKSPACE/ci/private-install"

      - name: Run tests
        run: dotnet test CustomWorkers.Tests/CustomWorkers.Tests.csproj /p:GameRoot="$GITHUB_WORKSPACE/ci/private-install"

      - name: Build plugin
        run: dotnet build CustomWorkers.csproj --configuration Release /p:GameRoot="$GITHUB_WORKSPACE/ci/private-install"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CustomWorkers
          path: bin/Release/net472/CustomWorkers.dll
